name: Electron Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            eb_flag: linux
          - os: windows-latest
            platform: windows
            eb_flag: win
          - os: macos-latest
            platform: mac
            eb_flag: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron
        run: npx vite build && npx electron-builder --${{ matrix.eb_flag }} --publish never
        env:
          VITE_UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_URL }}
          VITE_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_TOKEN }}

      - name: Generate latest.yml for Windows updater
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $exeFile = Get-ChildItem -Path release -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
          if (-not $exeFile) { Write-Error "No Setup exe found"; exit 1 }
          $sha512Bytes = [System.Security.Cryptography.SHA512]::Create().ComputeHash(
            [System.IO.File]::ReadAllBytes($exeFile.FullName)
          )
          $sha512 = [Convert]::ToBase64String($sha512Bytes)
          $size = $exeFile.Length
          $version = node -e "process.stdout.write(require('./package.json').version)"
          $releaseDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
          $blockmapFile = Get-ChildItem -Path $exeFile.DirectoryName -Filter "$($exeFile.Name).blockmap" -ErrorAction SilentlyContinue | Select-Object -First 1
          $blockMapSize = if ($blockmapFile) { $blockmapFile.Length } else { 0 }
          $ymlContent = @"
          version: $version
          files:
            - url: $($exeFile.Name)
              sha512: $sha512
              size: $size
              blockMapSize: $blockMapSize
          path: $($exeFile.Name)
          sha512: $sha512
          releaseDate: '$releaseDate'
          "@
          $ymlPath = Join-Path $exeFile.DirectoryName "latest.yml"
          Set-Content -Path $ymlPath -Value $ymlContent -Encoding UTF8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/**/*.AppImage
            release/**/*Setup*.exe
            release/**/*.dmg
            release/**/latest.yml
            release/**/*.blockmap
          if-no-files-found: warn
          retention-days: 7

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npx vite build
        env:
          VITE_UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_URL }}
          VITE_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_TOKEN }}

      - name: Add Android platform
        run: npx cap add android

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/release.keystore

      - name: Build signed release APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build-failure-reports"
          cd android
          set -o pipefail
          ./gradlew assembleRelease --stacktrace \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            2>&1 | tee "$GITHUB_WORKSPACE/build-failure-reports/gradle-build.log"

      - name: Remove keystore
        if: always()
        run: rm -f android/app/release.keystore

      - name: Collect Gradle reports on failure
        if: failure()
        run: |
          if [ -d android/build/reports ]; then
            cp -r android/build/reports "$GITHUB_WORKSPACE/build-failure-reports/gradle-reports"
          fi
          if [ -d android/app/build/reports ]; then
            cp -r android/app/build/reports "$GITHUB_WORKSPACE/build-failure-reports/app-reports"
          fi
          if [ -d android/capacitor-android/build/reports ]; then
            cp -r android/capacitor-android/build/reports "$GITHUB_WORKSPACE/build-failure-reports/capacitor-android-reports"
          fi

      - name: Upload build failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-reports-${{ github.run_number }}
          path: build-failure-reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f

      - name: Determine release tag
        id: tag
        run: |
          # Extrae el valor de "version" del package.json
          APP_VERSION=$(jq -r .version package.json)
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Si se lanzó manualmente, crea el tag usando la versión del package.json
            echo "tag=v$APP_VERSION" >> "$GITHUB_OUTPUT"
          else
            # Si se lanzó por un push de git tag, respeta ese tag
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Contabilidad M4 Pro ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*Setup*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.apk
            release-artifacts/**/latest.yml
            release-artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
