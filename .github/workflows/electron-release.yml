name: Electron Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            eb_flag: linux
          - os: windows-latest
            platform: windows
            eb_flag: win
          - os: macos-latest
            platform: mac
            eb_flag: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron
        run: npx vite build && npx electron-builder --${{ matrix.eb_flag }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/**/*.AppImage
            release/**/*.exe
            release/**/*.dmg
          if-no-files-found: warn
          retention-days: 7

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite
        run: npx vite build

      - name: Add Android platform
        run: npx cap add android

      - name: Enable ABI splits in build.gradle
        run: |
          python3 - <<'EOF'
          import re, sys, os
          path = 'android/app/build.gradle'
          if not os.path.exists(path):
              print(f"ERROR: {path} not found", file=sys.stderr)
              sys.exit(1)
          content = open(path).read()
          splits_block = (
              "\n    splits {"
              "\n        abi {"
              "\n            enable true"
              "\n            reset()"
              "\n            include 'armeabi-v7a', 'arm64-v8a'"
              "\n            universalApk false"
              "\n        }"
              "\n    }"
          )
          content = re.sub(r'(\n[ \t]*buildTypes[ \t]*\{)', splits_block + r'\1', content, count=1)
          open(path, 'w').write(content)
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/release.keystore

      - name: Build signed release APKs
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build-failure-reports"
          cd android
          set -o pipefail
          ./gradlew assembleRelease --stacktrace \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            2>&1 | tee "$GITHUB_WORKSPACE/build-failure-reports/gradle-build.log"

      - name: Remove keystore
        if: always()
        run: rm -f android/app/release.keystore

      - name: Collect Gradle reports on failure
        if: failure()
        run: |
          if [ -d android/build/reports ]; then
            cp -r android/build/reports "$GITHUB_WORKSPACE/build-failure-reports/gradle-reports"
          fi
          if [ -d android/app/build/reports ]; then
            cp -r android/app/build/reports "$GITHUB_WORKSPACE/build-failure-reports/app-reports"
          fi
          if [ -d android/capacitor-android/build/reports ]; then
            cp -r android/capacitor-android/build/reports "$GITHUB_WORKSPACE/build-failure-reports/capacitor-android-reports"
          fi

      - name: Upload build failure reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-reports-${{ github.run_number }}
          path: build-failure-reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -type f

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Contabilidad M4 Pro ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
